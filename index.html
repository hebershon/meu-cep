<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca CEP</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; padding: 40px; text-align: center; background: #f0f2f5; }
        .box { background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); display: inline-block; width: 100%; max-width: 350px; }
        h3 { color: #333; margin-bottom: 20px; }
        input { display: block; margin: 10px auto; padding: 12px; border: 1px solid #ddd; border-radius: 8px; width: 90%; font-size: 16px; outline: none; }
        input:focus { border-color: #007bff; box-shadow: 0 0 5px rgba(0,123,255,0.2); }
        button { width: 97%; padding: 12px; background: #007bff; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: background 0.3s; }
        button:hover { background: #0056b3; }
        .resultado { text-align: left; margin-top: 20px; color: #555; }
        .resultado span { font-weight: bold; color: #222; }
    </style>
</head>
<body>

<div class="box">
    <h3>Buscar Endereço</h3>
    <!-- Máscara aplicada via JS no oninput -->
    <input type="text" id="cep" placeholder="00000-000" maxlength="9" oninput="mascaraCEP(this)">
    <button onclick="buscar()">CONSULTAR</button>

    <div class="resultado">
        <p>Rua: <span id="rua">...</span></p>
        <p>Cidade: <span id="cidade">...</span></p>
    </div>
</div>

<script>
    // Adiciona o traço automaticamente enquanto digita
    function mascaraCEP(input) {
        let v = input.value.replace(/\D/g, '');
        if (v.length > 5) {
            v = v.replace(/^(\d{5})(\d)/, '$1-$2');
        }
        input.value = v;
    }

    function buscar() {
        const inputCep = document.getElementById('cep').value;
        const cep = inputCep.replace(/\D/g, ''); // Remove o traço para a API

        if (cep.length !== 8) {
            alert("Por favor, digite um CEP válido com 8 dígitos.");
            return;
        }

        // Feedback visual de carregamento
        document.getElementById('rua').innerText = "Buscando...";
        document.getElementById('cidade').innerText = "Buscando...";

        // Correção da URL: adicionado /ws/ e corrigido o template string
        fetch(`https://viacep.com.br{cep}/json/`)
            .then(res => res.json())
            .then(dados => {
                if (dados.erro) {
                    alert("CEP não encontrado!");
                    limparCampos();
                } else {
                    document.getElementById('rua').innerText = dados.logradouro || "Não disponível";
                    document.getElementById('cidade').innerText = `${dados.localidade} - ${dados.uf}`;
                }
            })
            .catch(() => {
                alert("Erro ao conectar com o serviço de busca.");
                limparCampos();
            });
    }

    function limparCampos() {
        document.getElementById('rua').innerText = "...";
        document.getElementById('cidade').innerText = "...";
    }
</script>

</body>
</html>
