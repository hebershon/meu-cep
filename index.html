<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Busca CEP - GitHub</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 20px; background: #f4f4f9; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 15px; background: #007AFF; color: white; border: none; border-radius: 8px; font-weight: bold; margin-top: 10px; cursor: pointer; }
        label { font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <h3>Buscar Endereço</h3>
    <label>CEP (8 dígitos):</label>
    <input type="tel" id="cep" placeholder="Ex: 01001000" maxlength="8">
    
    <button id="btnBuscar">BUSCAR AGORA</button>
    
    <div style="margin-top: 20px; border-top: 1px solid #eee; padding-top: 10px;">
        <input type="text" id="rua" placeholder="Rua" readonly>
        <input type="text" id="bairro" placeholder="Bairro" readonly>
        <input type="text" id="cidade" placeholder="Cidade" readonly>
        <input type="text" id="uf" placeholder="Estado" readonly>
    </div>
</div>

<script>
    document.getElementById('btnBuscar').addEventListener('click', async () => {
        const campoCep = document.getElementById('cep');
        const cep = campoCep.value.replace(/\D/g, '');

        if (cep.length !== 8) {
            alert("Por favor, digite 8 números.");
            return;
        }

        // Feedback visual
        document.getElementById('btnBuscar').innerText = "Buscando...";

        try {
            // Chamada direta via HTTPS para a Brasil API
            const response = await fetch(`https://brasilapi.com.br{cep}`);
            
            if (!response.ok) throw new Error('CEP não encontrado');

            const data = await response.json();

            // Preenchimento dos campos
            document.getElementById('rua').value = data.street || "";
            document.getElementById('bairro').value = data.neighborhood || "";
            document.getElementById('cidade').value = data.city || "";
            document.getElementById('uf').value = data.state || "";

        } catch (error) {
            alert("Erro: " + error.message);
        } finally {
            document.getElementById('btnBuscar').innerText = "BUSCAR AGORA";
        }
    });
</script>

</body>
</html>
