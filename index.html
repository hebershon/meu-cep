<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Busca CEP Pro</title>
    <style>
        /* Estilo iOS/iPadOS Moderno */
        body { 
            font-family: -apple-system, BlinkMacSystemFont, sans-serif; 
            background-color: #f2f2f7; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
        }
        .card { 
            background: #ffffff; 
            padding: 25px; 
            border-radius: 20px; 
            box-shadow: 0 10px 25px rgba(0,0,0,0.05); 
            width: 90%; 
            max-width: 360px; 
        }
        h2 { margin: 0 0 20px; font-size: 22px; color: #1c1c1e; text-align: center; }
        
        label { 
            display: block; 
            font-size: 11px; 
            color: #8e8e93; 
            font-weight: 600; 
            margin: 15px 0 5px 5px; 
            text-transform: uppercase; 
        }
        
        input { 
            width: 100%; 
            padding: 14px; 
            border: 1px solid #d1d1d6; 
            border-radius: 12px; 
            font-size: 17px; 
            box-sizing: border-box; 
            outline: none;
            transition: 0.2s;
        }
        input:focus { border-color: #007aff; }
        input[readonly] { background: #f9f9fb; border-color: #e5e5ea; color: #3a3a3c; }

        button { 
            width: 100%; 
            padding: 16px; 
            background: #007aff; 
            color: white; 
            border: none; 
            border-radius: 14px; 
            font-size: 17px; 
            font-weight: 600; 
            margin-top: 20px; 
            cursor: pointer;
        }
        button:active { opacity: 0.7; }
        button:disabled { background: #aeaeb2; cursor: not-allowed; }
    </style>
</head>
<body>

<div class="card">
    <h2>Buscar CEP</h2>
    
    <input type="tel" id="cepInput" placeholder="00000000" maxlength="8">
    <button id="btn" onclick="buscarCEP()">CONSULTAR AGORA</button>

    <label>Rua / Logradouro</label>
    <input type="text" id="rua" readonly placeholder="...">

    <label>Cidade - UF</label>
    <input type="text" id="cidade" readonly placeholder="...">
</div>

<script>
    async function buscarCEP() {
        const input = document.getElementById('cepInput');
        const btn = document.getElementById('btn');
        const campoRua = document.getElementById('rua');
        const campoCidade = document.getElementById('cidade');
        
        // Limpa apenas números
        const cep = input.value.replace(/\D/g, '');

        if (cep.length !== 8) {
            alert("Por favor, digite os 8 números do CEP.");
            return;
        }

        // Inicia carregamento
        btn.innerText = "Buscando...";
        btn.disabled = true;
        campoRua.value = "Carregando...";
        campoCidade.value = "Carregando...";

        try {
            // Faz a chamada para a API usando FETCH
            const response = await fetch(`https://viacep.com.br{cep}/json/`);
            const dados = await response.json();

            if (dados.erro) {
                alert("CEP não encontrado.");
                campoRua.value = "";
                campoCidade.value = "";
            } else {
                // Preenche os campos
                campoRua.value = dados.logradouro || "Não disponível";
                campoCidade.value = `${dados.localidade} - ${dados.uf}`;
            }
        } catch (erro) {
            alert("Erro de conexão. Verifique sua internet.");
            campoRua.value = "";
            campoCidade.value = "";
        } finally {
            // Finaliza carregamento
            btn.innerText = "CONSULTAR AGORA";
            btn.disabled = false;
        }
    }

    // Atalho: aperta "Enter" e já busca
    document.getElementById('cepInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') buscarCEP();
    });
</script>

</body>
</html>
